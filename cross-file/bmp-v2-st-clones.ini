# This a cross-file for the bmp-v2 probe. It defines a default configuration profile that
# provides support for all ARM Cortex architectures and target support for ST's parts,
# and their clones by Artery Tek, GigaDevice, WinChipHead, MindMotion, Puya and HDSC.

[binaries]
c = 'arm-none-eabi-gcc'
cpp = 'arm-none-eabi-g++'
ld = 'arm-none-eabi-gcc'
ar = 'arm-none-eabi-ar'
nm = 'arm-none-eabi-nm'
strip = 'arm-none-eabi-strip'
objcopy = 'arm-none-eabi-objcopy'
objdump = 'arm-none-eabi-objdump'
size = 'arm-none-eabi-size'

[host_machine]
system = 'bare-metal'
cpu_family = 'arm'
cpu = 'arm'
endian = 'little'

[project options]
probe = 'bmp-v2'
targets = 'cortexar,cortexm,stm,at32f4,gd32,ch32,ch579,mm32,puya,hc32'
rtt_support = false
bmd_bootloader = true
